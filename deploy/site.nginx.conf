# Upstream pool for Strapi replicas
upstream strapi_backend {
    least_conn;

    server 127.0.0.1:1337 max_fails=3 fail_timeout=30s;
    # server 127.0.0.1:1338 max_fails=3 fail_timeout=30s;
    # server 127.0.0.1:1339 max_fails=3 fail_timeout=30s;

    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;

    server_name cms.couponzguru.com;

    return 301 https://cms.couponzguru.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    listen 443 quic;
    listen [::]:443 quic;
    http2 on;

    server_name cms.couponzguru.com;

    ssl_certificate /etc/letsencrypt/live/cms.couponzguru.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cms.couponzguru.com/privkey.pem;

    access_log /home/vira8394/cms.couponzguru.com/logs/access.log;
    error_log /home/vira8394/cms.couponzguru.com/logs/error.log;

    add_header Alt-Svc 'h3=":443"; ma=86400' always;

    location / {
        proxy_pass http://strapi_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering on;
        proxy_pass_request_headers on;
    }
}